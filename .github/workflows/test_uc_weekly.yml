name: UC weekly regression

on:
  schedule:
    # 06:00 UTC every Monday
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

defaults:
  run:
    shell: bash -l {0}

jobs:
  uc:
    name: run_uc.py (HiGHS, egret from git)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: test_env
          python-version: 3.11

      - name: Install dependencies
        run: |
          conda install mpi4py pandas setuptools
          pip install pyomo dill pybind11 highspy
          pip install git+https://github.com/grid-parity-exchange/egret.git

      - name: setup the program
        run: |
          pip install -e .

      - name: Run run_uc.py
        run: |
          cd examples
          python run_uc.py appsi_highs
